<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ganpati Bappa</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #fff7e6, #ffe6f0);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.06);
    }
    .header {
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px dashed #f0c;
      background: #fff9fb;
    }
    .header .emoji {
      font-size: 28px;
      line-height: 1;
    }
    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    figure {
      margin: 0;
      padding: 0;
      position: relative;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: cover;
    }
    figcaption {
      padding: 14px 18px 20px;
      color: #333;
      line-height: 1.6;
      font-size: 16px;
    }
    .caption-title {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 18px;
    }
    .credit {
      font-size: 12px;
      color: #666;
    }
    .credit a { color: inherit; text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card" role="main" aria-label="Ganpati Bappa Image Card">
    <div class="header">
      <span class="emoji" aria-hidden="true">🙏</span>
      <h1 class="title">Ganpati Bappa Morya!</h1>
    </div>

    <figure>
      <!-- Replace the src with your file name or a full image URL -->
      <img src="c:\Users\lenovo\Music\User InterFace Wed tech\program.html\bappa.png.jpg" alt="Idol of Lord Ganesha (Bappa) decorated with flowers and lights" />
      <figcaption>
        <div class="caption-title">ॐ गं गणपतये नमः</div>
        May Bappa bring wisdom, prosperity, and joy to your home.
        <div class="credit">Tip: Place your image in the same folder as this HTML, or use an online image URL.</div>
      </figcaption>
    </figure>
  </main>
</body>
</html>
