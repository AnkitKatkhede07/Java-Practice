<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="stylesheet" href="CSS/chatgpt1.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>REGISTRATION FORM</h2>
        <div class="company">
            <strong>COMPANY</strong><br>
            <small>Tagline Here</small>
        </div>
    </div>

    <div class="row">
        <div class="col-50">
            <label>Date:</label>
            <input type="date">
        </div>
        <div class="col-50">
            <label>No:</label>
            <input type="text" placeholder="Enter number">
        </div>
    </div>

    <div class="section-title">Personal Information</div>
    <div class="row">
        <div class="col-50">
            <label>Full Name</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>Nationality</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
            </div>
        </div>
        <div class="col-50">
            <label>Date of Birth</label>
            <input type="date">
        </div>

        <div class="col-50">
            <label>Father's Name</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>Place of Birth</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>Mother's Name</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>Marital Status</label>
            <div class="radio-group">
                <label><input type="radio" name="marital"> Single</label>
                <label><input type="radio" name="marital"> Married</label>
            </div>
        </div>

        <div class="col-50">
            <label>Residential</label>
            <div class="radio-group">
                <label><input type="radio" name="res"> Resident</label>
                <label><input type="radio" name="res"> Non-Resident</label>
            </div>
        </div>
        <div class="col-50">
            <label>TIN No</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>Passport No</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>NID No</label>
            <input type="text">
        </div>
    </div>

    <div class="section-title">Contact Information</div>
    <div class="row">
        <div class="col-50">
            <label>Address</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>State</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>City</label>
            <input type="text">
        </div>
        <div class="col-50">
            <label>Country</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>Zip Code</label>
            <input type="number">
        </div>
        <div class="col-50">
            <label>Phone</label>
            <input type="text">
        </div>

        <div class="col-50">
            <label>Email</label>
            <input type="email">
        </div>
    </div>

    <div class="signature">
        <label>Signature</label>
        <input type="text" placeholder="Sign here">
    </div>

    <div style="margin-top: 20px;">
        <button type="submit">Submit</button>
    </div>
</div>

</body>
</html>
