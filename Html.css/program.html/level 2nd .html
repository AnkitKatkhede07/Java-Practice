<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video element</title>
</head>
<body>
    <video width="550px" height="600px" poster="natural.png" controls>
       <source src="video 1.mp4">
    </video>
    <!--2 nd auto play-->
    <video  width="550px" height="600px"  loop muted autoplay="autoplay">
        <source src="video 1.mp4">
    </video>
    <!--3 rd natural video-->
    <video width="550px" height="600px" controls>
      <source src="video 1.mp4">
    </video>
</body>
</html>
